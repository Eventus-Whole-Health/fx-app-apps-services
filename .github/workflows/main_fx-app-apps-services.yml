# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions
#
# Pattern aligned with fx-app-data-services / fx-app-pims-services:
#   - App settings provide BUILD_FLAGS=UseExpressBuild + ENABLE_ORYX_BUILD + SCM_DO_BUILD_DURING_DEPLOYMENT
#   - Workflow ships source via remote-build: true; Oryx installs deps server-side into /data/SitePackages
#   - No -t . local install (would pollute wwwroot with runner-OS wheels)

name: Build and deploy Python project to Azure Function App - fx-app-apps-services

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Deploy to Azure Functions"
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: "fx-app-apps-services"
          slot-name: "Production"
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          # publish-profile uses Kudu /api/zipdeploy which disables Oryx by default.
          # These params force the build endpoint /api/deployments/zipdeploy?isAsync=true
          # so Oryx server-side install runs.
          scm-do-build-during-deployment: true
          enable-oryx-build: true
